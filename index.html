<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tube Amps & FX</title>

<link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">

<style>
/* ================= BASE ================= */
body {
  margin: 0;
  font-family: "Lato", sans-serif;
  background: #000;
  color: #fff;
}

/* ================= HEADER ================= */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #000;
  border-bottom: 1px solid #222;
  z-index: 1000;
}

/* container */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
}

/* logo */
.logo {
  font-weight: bold;
}

/* botão hamburger */
.hamburger {
  font-size: 22px;
  cursor: pointer;
  background: none;
  border: none;
  color: #fff;
}

/* ================= MENU ================= */

/* mobile */
.menu {
  display: none;
  flex-direction: column;
  background: #000;
  border-top: 1px solid #222;
}

.menu a {
  padding: 12px 16px;
  text-decoration: none;
  color: #fff;
  border-bottom: 1px solid #111;
}

.menu a:hover {
  background: #111;
}

/* estado ativo */
.menu.active {
  display: flex;
}

/* ================= DESKTOP ================= */
@media (min-width: 768px) {

  .hamburger {
    display: none;
  }

  .menu {
    display: flex !important;
    flex-direction: row;
    border: none;
  }

  .menu a {
    border: none;
  }
}

/* ================= MAIN ================= */
main {
  margin-top: 70px;
  padding: 20px;
  text-align: center;
}

/* ================= HERO ================= */
.hero img {
  max-width: 400px;
  width: 100%;
}
</style>

</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="nav">
    <div class="logo">Tube Amps & FX</div>

    <button class="hamburger" onclick="toggleMenu()">
      ☰
    </button>

    <nav id="menu" class="menu">
      <a href="#">HOME</a>
      <a href="#">ABOUT</a>
      <a href="#">ARTIGOS</a>
      <a href="#">CONTATO</a>
    </nav>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main>

  <section class="hero">
    <img src="logo_tube_amps_fx.webp" alt="logo">
    <p>Comunidade maker de áudio analógico</p>
  </section>

</main>

<!-- ================= SCRIPT ================= -->
<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.classList.toggle("active");
}
</script>

</body>
</html>
